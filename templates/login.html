<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - SimaControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #050510;
            background-image: radial-gradient(circle at 50% 50%, #1a1a40 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            color: #fff;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.4);
            border-color: #00f3ff;
            box-shadow: 0 0 8px #00f3ff;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(45deg, #00f3ff, #bc13fe);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.4);
        }
        label {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🚀 SimaControl</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Логин</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <div class="text-center mt-3" style="color: #666; font-size: 0.85em;">
            <p>Тестовые логины:<br>
            admin / admin123<br>
            ff / ff123</p>
        </div>
    </div>
</body>
</html>
