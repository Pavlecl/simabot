<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMA CONTROL — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0f1318;
    --border: #1e2530;
    --accent: #e85d26;
    --accent-dim: #7a2e10;
    --text: #c8d0dc;
    --text-dim: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Фоновая сетка */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
  }

  /* Оранжевое свечение за карточкой */
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(232,93,38,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 380px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 48px 40px;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .logo {
    font-family: var(--display);
    font-size: 36px;
    letter-spacing: 4px;
    color: #fff;
    margin-bottom: 4px;
  }

  .logo span { color: var(--accent); }

  .subtitle {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--accent); }

  button {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  button:hover { background: #c94d1e; }

  .error {
    background: rgba(232,93,38,0.1);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .corner {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 20px; height: 20px;
    border-right: 1px solid var(--accent-dim);
    border-bottom: 1px solid var(--accent-dim);
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="corner"></div>
  <div class="logo">SIMA<span>.</span>CTRL</div>
  <div class="subtitle">Система управления заказами</div>

  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <label>Логин</label>
    <input type="text" name="username" autocomplete="username" autofocus required>

    <label>Пароль</label>
    <input type="password" name="password" autocomplete="current-password" required>

    <button type="submit">ВОЙТИ →</button>
  </form>
</div>
</body>
</html>
