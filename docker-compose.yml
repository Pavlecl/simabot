version: "3.9"

# 📚 УРОК: docker-compose запускает несколько контейнеров как единую систему.
# Каждый сервис — это отдельный процесс в своём контейнере.
# Они общаются по имени сервиса (например: db, bot → db:5432)

services:

  # --- База данных PostgreSQL ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-sima_control}
    volumes:
      # Данные хранятся на диске хоста — не пропадут при перезапуске
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Telegram Bot ---
  bot:
    build: .
    restart: always
    command: python main.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # 📚 УРОК: depends_on с condition гарантирует, что бот стартует
    # только когда PostgreSQL готов принимать подключения (healthcheck).

  # --- Веб-интерфейс FastAPI ---
  web:
    build: .
    restart: always
    command: uvicorn web_app:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
      # Порт 8000 хоста → порт 8000 контейнера
      # В production лучше поставить nginx перед ним (HTTPS, сжатие)
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: